<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fast & Code | Elite Tech Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@100..800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                blue: '#0066FF',
                obsidian: '#050505',
                charcoal: '#0f0f0f',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              header: ['Syncopate', 'sans-serif'],
            },
            animation: {
              'shimmer': 'shimmer 2s linear infinite',
              'noise': 'noise 0.2s infinite',
              'marquee': 'marquee 25s linear infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              noise: {
                '0%, 100%': { transform: 'translate(0, 0)' },
                '10%': { transform: 'translate(-1%, -1%)' },
                '20%': { transform: 'translate(-2%, 1%)' },
                '30%': { transform: 'translate(1%, -2%)' },
                '40%': { transform: 'translate(-1%, 3%)' },
                '50%': { transform: 'translate(-2%, 1%)' },
                '60%': { transform: 'translate(3%, 0)' },
                '70%': { transform: 'translate(0, 2%)' },
                '80%': { transform: 'translate(-3%, 0)' },
                '90%': { transform: 'translate(2%, 1%)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-25%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --brand-blue: #0066FF;
        --brand-obsidian: #050505;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html {
        background-color: var(--brand-obsidian);
        scrollbar-width: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
      }
      html::-webkit-scrollbar {
        display: none;
      }
      body {
        margin: 0;
        color: white;
        overflow-x: hidden;
        cursor: none;
        background: #050505;
        width: 100%;
        min-height: 100vh;
      }
      
      .glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .shimmer-text {
        background: linear-gradient(90deg, var(--brand-blue) 0%, #ffffff 50%, var(--brand-blue) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 3s linear infinite;
      }
      
      .px-fluid {
        width: 100%;
        max-width: 1600px;
        margin-left: auto;
        margin-right: auto;
        padding-left: clamp(1.25rem, 5vw, 6rem);
        padding-right: clamp(1.25rem, 5vw, 6rem);
      }

      .py-fluid-section {
        padding-top: clamp(3rem, 10vh, 12rem);
        padding-bottom: clamp(3rem, 10vh, 12rem);
      }

      .text-fluid-h1 {
        font-family: 'Syncopate', sans-serif;
        font-size: clamp(3rem, 10vw, 8.5rem);
        line-height: 0.85;
        letter-spacing: -0.06em;
        text-transform: uppercase;
      }
      .text-fluid-h2 {
        font-family: 'Syncopate', sans-serif;
        font-size: clamp(1.5rem, 5vw, 4.5rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }
      
      .noise-overlay {
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.04;
        z-index: 1000;
        pointer-events: none;
        animation: noise 0.5s steps(3) infinite;
        will-change: transform;
      }
      
      @media (pointer: coarse) {
        body { cursor: auto; }
      }

      /* Fix for mobile height issues */
      .min-h-screen-ios {
        min-height: -webkit-fill-available;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "framer-motion": "https://esm.sh/framer-motion@^12.25.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "canvas-confetti": "https://esm.sh/canvas-confetti@^1.9.4",
    "lenis": "https://esm.sh/lenis@^1.3.17",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
    "three": "https://esm.sh/three@^0.182.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="noise-overlay"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
